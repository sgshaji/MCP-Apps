  // ── Helpers ────────────────────────────────────────────────────────────────
  function post(data) { document.getElementById('widget').contentWindow.postMessage(data, '*'); }

  function log(msg) {
    var el = document.getElementById('log');
    el.innerHTML += '<br>' + new Date().toLocaleTimeString() + '  ' + msg;
    el.scrollTop = el.scrollHeight;
  }

  function sendPayload(payload) {
    post({ jsonrpc: '2.0', method: 'ui/notifications/tool-result', params: { structuredContent: payload } });
    log('→ Sent: ' + payload.review_title + ' (' + payload.statements.length + ' statement(s))');
  }

  function sendAll3()            { sendPayload(ALL_3);   }
  function sendBalanceSheetOnly(){ sendPayload(BS_ONLY); }
  function sendCashFlowOnly()    { sendPayload(CF_ONLY); }

  function toggleTheme() {
    isDark = !isDark;
    document.body.style.background = isDark ? '#1a1a1a' : '#f0f0f0';
    document.body.style.color      = isDark ? '#f0f0f0' : '#111';
    post({ jsonrpc: '2.0', method: 'ui/notifications/theme-change', params: { theme: isDark ? 'dark' : 'light' } });
    log('→ Theme: ' + (isDark ? 'dark' : 'light'));
  }

  // ── Handle messages FROM the widget ───────────────────────────────────────
  window.addEventListener('message', function(e) {
    var msg = e.data; if (!msg) return;

    // callTool: widget is submitting the review result
    if (msg.jsonrpc === '2.0' && msg.method === 'ui/callTool') {
      var name = msg.params.name;
      var args = msg.params.args;
      log('← callTool: ' + name);
      if (args.approved !== undefined) {
        log('  approved=' + args.approved + ', edits=' + (args.edits || []).length +
            (args.rejection_reason ? ', reason="' + args.rejection_reason + '"' : ''));
      }
      // Mock successful acknowledgement
      setTimeout(function() {
        post({ jsonrpc: '2.0', id: msg.id, result: { approved: args.approved, acknowledged: true } });
        log('→ Returned mock ack to widget');
      }, 400);
      return;
    }

    // Iframe height notification
    if (msg.method === 'ui/notifyIntrinsicHeight') {
      document.getElementById('widget').style.height = (msg.params.height + 4) + 'px';
    }
  });

  // Auto-load on start
  window.addEventListener('load', function() {
    setTimeout(function() { sendPayload(ALL_3); }, 300);
